server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets Angular
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml
               application/xml image/svg+xml;
    gzip_min_length 1024;

    # Angular SPA — redireciona tudo para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para a API — evita CORS em produção
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Cache agressivo para assets com hash
    location ~* \.(js|css|png|jpg|ico|woff2)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }

    # Sem cache para index.html — garante versão mais recente
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
