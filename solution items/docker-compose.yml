name: crm-clientes

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── Keycloak ────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: crm-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN:          ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB:                   postgres
      KC_DB_URL:               jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME:          ${POSTGRES_USER}
      KC_DB_PASSWORD:          ${POSTGRES_PASSWORD}
      KC_HOSTNAME_STRICT:      false
      KC_HTTP_ENABLED:         true
    ports:
      - "8080:8080"
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:     ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout:  10s
      retries:  10

  # ─── Backend: API .NET 10 ────────────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: src/Challenge.CRM.Rommanel.Api/Dockerfile
    container_name: crm-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT:               ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__Default:           Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Keycloak__Authority:                  http://keycloak:8080/realms/${KEYCLOAK_REALM}
      Keycloak__Audience:                   ${KEYCLOAK_CLIENT_ID}
      Keycloak__RequireHttpsMetadata:       false
      Cors__AllowedOrigin:                  http://localhost:${FRONTEND_PORT}
    ports:
      - "${API_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  # ─── Frontend: Angular ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: src/Dockerfile
    container_name: crm-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - api

volumes:
  postgres_data: